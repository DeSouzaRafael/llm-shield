name: permissive
input:
  - type: length_check
    max_chars: 32000
    max_tokens: 8000
  - type: pii_detector
    severity_on_detect: warn
    entities: [cpf, credit_card]
  - type: prompt_injection
    threshold: 0.95
output:
  - type: pii_redactor
    mode: mask
    entities: [cpf, credit_card]
  - type: toxicity_filter
    threshold: 0.90
    severity_on_detect: warn
