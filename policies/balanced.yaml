name: balanced
input:
  - type: length_check
    max_chars: 8000
    max_tokens: 2000
  - type: pii_detector
    severity_on_detect: block
    entities: [email, cpf, credit_card]
  - type: prompt_injection
    threshold: 0.85
  - type: topic_classifier
    threshold: 0.75
    blocked_topics:
      - violence
      - self-harm
      - illegal activity
      - hate speech
      - adult content
output:
  - type: pii_redactor
    mode: mask
    entities: [email, cpf, credit_card]
  - type: toxicity_filter
    threshold: 0.75
    severity_on_detect: block
  - type: hallucination_check
    threshold: 0.35
    min_sentences: 2
